<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.url != "/" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9656;</text></svg>">
    <script>
      (function () {
        var t = null;
        try { t = localStorage.getItem("theme"); } catch (e) {}
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <nav class="site-nav">
        <a class="site-name" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="nav-links">
          <a href="{{ '/#research' | relative_url }}">Research &amp; Writing</a>
          <a href="{{ '/#work' | relative_url }}">Work</a>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme">
            <span class="moon">&#9789;</span><span class="sun">&#9728;</span>
          </button>
        </div>
      </nav>

      <main>
        {{ content }}
      </main>

      <footer>
        <div class="footer-links">
          <a href="https://github.com/{{ site.github_username }}">GitHub</a>
          <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}/">LinkedIn</a>
          <a href="{{ site.scholar_url }}">Scholar</a>
          <a href="mailto:{{ site.author.email }}">Email</a>
        </div>
        <p class="colophon">&copy; {{ site.time | date: "%Y" }} {{ site.author.name }}</p>
      </footer>
    </div>
    <script>
      document.getElementById("theme-toggle").addEventListener("click", function () {
        var root = document.documentElement;
        var current = root.getAttribute("data-theme");
        if (!current) {
          current = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        var next = current === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        try { localStorage.setItem("theme", next); } catch (e) {}
      });
    </script>
  </body>
</html>
